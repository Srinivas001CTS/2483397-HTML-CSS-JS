<!DOCTYPE html>
<html>
    <body>
        <h1>Java script variables</h1>
        <p>The sum of 2+3+8 is:</p>
        <p id="demo1"></p>

        <p>Addition of strrings "kanuparthi" and "srinivasulu" is:</p>
        <p id="demo2"></p>
        
        <p>Addition of string "5" and integer 6 and 3 is:</p>
        <p id="demo3"></p>
        <script>
            let a, b, c;
            a = 2 +3+8;
            document.getElementById("demo1").innerHTML=a;
            b = "kanuparthi" + " srinivasulu";
            document.getElementById("demo2").innerHTML=b;
            c = "5" + 6 + 3;
            document.getElementById("demo3").innerHTML=c;
        </script>
    </body>
</html>
