<!DOCTYPE html>
<html>
    <body>
        <h1>Java Script const Objects</h1>
        <p>In Java Script, you can change the properties of the constant objects</p>
        <p id="demo"></p>
        <script>
            const cars={color:"red", model:"Benz", price:"1 Crore"};
            cars.color="black";
        document.getElementById("demo").innerHTML="Car color:"+cars.color;
        </script>
    </body>
</html>
