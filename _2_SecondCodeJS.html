<! DOCTYPE html>
<html>
    <body>
        <h3>
            Javascrpt can change the HTML attributes !
        </h3>
        <p>Java scrpt can change the value of src(source) attribute of an img tab</p>
        <button onclick='document.getElementById("myImage").src="bulbOnImage.jpg"'>
            Turn on Light
        </button>
        <img id = "myImage"; src="bulbOffImage.jpg"; style="width:100px;">
        <button onclick='document.getElementById("myImage").src="bulbOffImage.jpg" '>
            Turn Off Light
        </button>
    </body>
</html>
