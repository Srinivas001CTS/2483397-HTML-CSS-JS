<!DOCTYPE html>
<html>
    <body>
        <h2>Let Hoisting...</h2>
        <p>Variables defined with let are also hoisted to the top of the block, but not initialized.

Meaning: Using a let variable before it is declared will result in a ReferenceError:</p>
        <p id="demo"></p>
        <script>
            try{
                x="sreenu";
                let x="vasulu";
            }catch(err){
                document.getElementById("demo").innerHTML=err;
            }
        </script>
    </body>
</html>
