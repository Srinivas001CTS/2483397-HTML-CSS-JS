<!DOCTYPE html>
<html>
    <body>
        <h2>Java Script Hoisting</h2>
        <p>In JavaScript, <b>you can use a variable before declaring it</b> and It is called hosting.</p>
        <p>Variables defined with var are hoisted to the top and can be initialized at any time</p>
        <p id="demo"></p>
        <script>
            x=21;
            
            document.getElementById("demo").innerHTML=x;
            var x="sreenu";
        </script>
    </body>
</html>
