<!DOCTYPE html>
<html>
    <body>
        <h2>Java Script const</h2>
        <p>Declaring a constant array does'nt mean NOt changing the elements inside the array..</p>
        <p id="demo"></p>
        <script>
            const arr=[1, 2, 3, 4, 5, 6];
            
            arr[0]=10;
            document.getElementById("demo").innerHTML=arr;
        </script>
    </body>
</html>
